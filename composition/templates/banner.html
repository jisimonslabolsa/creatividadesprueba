<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
{% if font_url %}<link rel="stylesheet" href="{{ font_url }}">{% endif %}
<style>
  :root { --accent: {{ accent_color }}; --brand: {{ brand_color }}; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{ width }}px; height: {{ height }}px; overflow: hidden; }

  .banner { position: relative; width: 100%; height: 100%;
            font-family: {{ body_font }}; color: #fff; background: var(--brand);
            display: flex; align-items: center;
            {% if wide %}
            flex-direction: row; gap: 14px; padding: 0 18px;
            {% else %}
            flex-direction: column; justify-content: space-between;
            padding: 16px; text-align: center;
            {% endif %} }

  .bg { position: absolute; inset: 0;
        {% if background %}background: url('{{ background }}') center / cover; opacity: .55;{% endif %} }
  .tint { position: absolute; inset: 0;
          {% if background %}
          background: linear-gradient(90deg, var(--brand) 0%, rgba(0,0,0,.05) 100%);
          {% else %}display: none;{% endif %} }

  .logo { position: relative; flex: none; object-fit: contain;
          height: {% if wide %}58%{% else %}22px{% endif %}; max-width: 120px; }

  .txt { position: relative; flex: 1; display: flex; flex-direction: column;
         justify-content: center; }

  .headline { font-family: {{ display_font }}; font-weight: 800; line-height: 1.05;
              letter-spacing: -0.01em;
              font-size: {% if wide %}clamp(14px, 3.2vw, 22px){% else %}clamp(15px, 7vw, 26px){% endif %}; }

  .cta { position: relative; flex: none; background: var(--accent); color: #fff;
         font-family: {{ display_font }}; font-weight: 700; white-space: nowrap;
         border-radius: 6px; padding: 8px 16px; font-size: 13px;
         {% if not wide %}align-self: center;{% endif %} }
</style>
</head>
<body>
  <div class="banner">
    <div class="bg"></div>
    <div class="tint"></div>
    {% if logo %}<img class="logo" src="{{ logo }}" alt="">{% endif %}
    <div class="txt">{% if headline %}<div class="headline">{{ headline }}</div>{% endif %}</div>
    {% if cta %}<div class="cta">{{ cta }}</div>{% endif %}
  </div>
</body>
</html>
