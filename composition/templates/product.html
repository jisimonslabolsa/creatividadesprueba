<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
{% if font_url %}<link rel="stylesheet" href="{{ font_url }}">{% endif %}
<style>
  :root { --accent: {{ accent_color }}; --brand: {{ brand_color }}; --pad: 6vmin; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{ width }}px; height: {{ height }}px; overflow: hidden; }

  .stage { position: relative; width: 100%; height: 100%;
           font-family: {{ body_font }}; color: #fff; background: #0c0c0e; }

  .bg { position: absolute; inset: 0;
        {% if background %}
        background: url('{{ background }}') center / cover no-repeat;
        {% else %}
        background: linear-gradient(135deg, var(--brand), #000);
        {% endif %} }
  .scrim { position: absolute; inset: 0;
           background: linear-gradient(180deg,
             rgba(0,0,0,.12) 0%, rgba(0,0,0,.42) 62%, rgba(0,0,0,.82) 100%); }

  .logo { position: absolute; top: var(--pad); left: var(--pad);
          height: 7vmin; max-width: 40%; object-fit: contain; z-index: 3; }

  .content { position: absolute; inset: 0; padding: var(--pad); z-index: 2;
             display: flex;
             {% if layout == 'side' %}
             flex-direction: row; align-items: center; gap: 4vmin;
             {% else %}
             flex-direction: column; justify-content: flex-end; gap: 2.4vmin;
             {% endif %} }

  {% if layout == 'side' %}
  .prod { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; }
  .prod img { max-width: 100%; max-height: 86%; object-fit: contain;
              filter: drop-shadow(0 12px 32px rgba(0,0,0,.55)); }
  .txt { flex: 1.05; display: flex; flex-direction: column; justify-content: center; gap: 2.2vmin; }
  {% else %}
  .prod { order: -1; flex: 1; min-height: 0; display: flex;
          align-items: center; justify-content: center; margin-bottom: 1vmin; }
  .prod img { max-width: 82%; max-height: 100%; object-fit: contain;
              filter: drop-shadow(0 12px 32px rgba(0,0,0,.55)); }
  .txt { display: flex; flex-direction: column; gap: 2.2vmin; }
  {% endif %}

  .headline { font-family: {{ display_font }}; font-weight: 800; line-height: 1.03;
              letter-spacing: -0.02em; text-wrap: balance;
              font-size: clamp(22px, 8.5vmin, 120px);
              text-shadow: 0 2px 24px rgba(0,0,0,.35); }
  .body { font-size: clamp(12px, 3.6vmin, 34px); opacity: .93; line-height: 1.3; max-width: 95%; }
  .cta { align-self: flex-start; margin-top: .6vmin;
         background: var(--accent); color: #fff; font-family: {{ display_font }};
         font-weight: 700; font-size: clamp(12px, 3.2vmin, 30px);
         padding: 2.2vmin 4.4vmin; border-radius: 999px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="scrim"></div>
    {% if logo %}<img class="logo" src="{{ logo }}" alt="">{% endif %}
    <div class="content">
      {% if product %}<div class="prod"><img src="{{ product }}" alt=""></div>{% endif %}
      <div class="txt">
        {% if headline %}<div class="headline">{{ headline }}</div>{% endif %}
        {% if body %}<div class="body">{{ body }}</div>{% endif %}
        {% if cta %}<div class="cta">{{ cta }}</div>{% endif %}
      </div>
    </div>
  </div>
</body>
</html>
