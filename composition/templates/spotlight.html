<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
{% if font_url %}<link rel="stylesheet" href="{{ font_url }}">{% endif %}
<style>
  :root { --accent: {{ accent_color }}; --brand: {{ brand_color }}; --pad: 7vmin; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{ width }}px; height: {{ height }}px; overflow: hidden; }

  .stage { position: relative; width: 100%; height: 100%;
           font-family: {{ body_font }}; background: #0c0c0e; color: #fff; }

  .bg { position: absolute; inset: 0;
        {% if background %}
        background: url('{{ background }}') center / {% if contain %}contain{% else %}cover{% endif %} no-repeat;
        {% else %}
        background: linear-gradient(135deg, var(--brand), #000);
        {% endif %} }

  /* Scrim para legibilidad del texto sobre cualquier foto */
  .scrim { position: absolute; inset: 0;
           background: linear-gradient(180deg,
             rgba(0,0,0,.18) 0%, rgba(0,0,0,0) 36%, rgba(0,0,0,.82) 100%); }

  .logo { position: absolute; top: var(--pad); left: var(--pad);object-fit: contain;filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
          {% if narrow %}
          width: calc(100% - 2 * var(--pad)); max-width: none; height: auto;
          {% else %}
          height: 16vmin; max-width: 42%;
          {% endif %} }
  }

  .content { position: absolute; inset: 0; padding: var(--pad);
             display: flex; flex-direction: column; justify-content: flex-end;
             gap: 2.6vmin; }

  .headline { font-family: {{ display_font }}; font-weight: 800; line-height: 1.02;
              font-size: clamp(26px, 10.5vmin, 150px); letter-spacing: -0.02em;
              text-wrap: balance; text-shadow: 0 2px 28px rgba(0,0,0,.35); }

  .body { font-weight: 400; opacity: .94; max-width: 92%; line-height: 1.3;
          font-size: clamp(13px, 4.1vmin, 40px); }

  .cta { align-self: flex-start; margin-top: 1vmin;
         background: var(--accent); color: #fff; font-family: {{ display_font }};
         font-weight: 700; font-size: clamp(12px, 3.6vmin, 34px);
         padding: 2.4vmin 4.6vmin; border-radius: 999px; letter-spacing: .01em; }
</style>
</head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="scrim"></div>
    {% if logo %}<img class="logo" src="{{ logo }}" alt="">{% endif %}
    <div class="content">
      {% if headline %}<div class="headline">{{ headline }}</div>{% endif %}
      {% if body %}<div class="body">{{ body }}</div>{% endif %}
      {% if cta %}<div class="cta">{{ cta }}</div>{% endif %}
    </div>
  </div>
</body>
</html>
